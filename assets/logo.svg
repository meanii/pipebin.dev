<svg width="520" height="110" viewBox="0 0 520 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card background -->
  <rect width="520" height="110" rx="10" fill="#0d0d0d"/>

  <!-- Top bar -->
  <rect width="520" height="44" rx="10" fill="#141414"/>
  <rect y="34" width="520" height="10" fill="#141414"/>
  <rect y="34" width="520" height="1" fill="#1e1e1e"/>

  <!-- macOS dots -->
  <circle cx="26" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="48" cy="22" r="6" fill="#febc2e"/>
  <circle cx="70" cy="22" r="6" fill="#28c840"/>

  <!-- Window title -->
  <text x="260" y="27" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', ui-monospace, monospace" font-size="12" fill="#444" letter-spacing="0.5">bash</text>

  <!-- Pipe glyph accent -->
  <text x="30" y="82" font-family="'JetBrains Mono', 'Fira Code', ui-monospace, monospace" font-size="30" font-weight="700" fill="#4f8ef7">|</text>

  <!-- pipebin -->
  <text x="50" y="82" font-family="'JetBrains Mono', 'Fira Code', ui-monospace, monospace" font-size="30" font-weight="600" fill="#e5e5e5">pipebin</text>

  <!-- .dev -->
  <text x="216" y="82" font-family="'JetBrains Mono', 'Fira Code', ui-monospace, monospace" font-size="30" font-weight="400" fill="#555">.dev</text>

